<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Jeu de soirée</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="lobby">
    <h1>Party Guess</h1>
    <input id="name" placeholder="Ton prénom" />
    <input id="code" placeholder="Code de partie" />
    <input type="number" id="rounds" min="1" max="20" placeholder="Nombre de rounds">
    <button id="create">Créer</button>
    <button id="join">Rejoindre</button>
    <div id="players"></div>
    <button id="start" style="display:none;">Lancer la partie</button>
  </div>

  <div id="writing" style="display:none;">
    <h2 id="assignment"></h2>
    <input id="word" placeholder="Un mot" />
    <button id="sendWord">Envoyer</button>
  </div>

  <div id="guessing" style="display:none;">
    <h2>Mots reçus</h2>
    <ul id="wordsList"></ul>
    <div id="guessArea" style="margin-top:20px;"></div>
    <div id="feedback" style="margin-top:20px; font-size:1.2rem; text-align:center;"></div>
    <button id="nextRound" style="display:none; margin-top:20px;">Round Suivant</button>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="client.js"></script>
</body>
</html>
